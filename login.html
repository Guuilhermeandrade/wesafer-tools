<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" type="image/png" href="assets/img/favicon.ico">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGIN - WESAFER ACESSOS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Inter',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
        radial-gradient(circle at top left,rgba(37,99,235,.25),transparent 35%),
        radial-gradient(circle at bottom right,rgba(14,165,233,.18),transparent 35%),
        linear-gradient(180deg,#020617,#0f172a);
    color:#e5e7eb;
    padding:20px;
}

.login-card{
    width:100%;
    max-width:430px;
    background:rgba(15,23,42,.82);
    border:1px solid rgba(147,197,253,.22);
    border-radius:26px;
    padding:34px;
    box-shadow:0 28px 80px rgba(0,0,0,.48);
    backdrop-filter:blur(14px);
}

.logo{
    display:flex;
    justify-content:center;
    margin-bottom:22px;
}

.logo img{
    max-width:190px;
    width:60%;
}

.badge{
    width:max-content;
    max-width:100%;
    margin:0 auto 14px;
    padding:7px 13px;
    border-radius:999px;
    background:rgba(37,99,235,.18);
    border:1px solid rgba(147,197,253,.22);
    color:#93c5fd;
    font-size:11px;
    font-weight:900;
    letter-spacing:.7px;
    text-align:center;
}

h1{
    text-align:center;
    font-size:24px;
    margin-bottom:8px;
    font-weight:900;
}

.subtitulo{
    text-align:center;
    color:#94a3b8;
    font-size:13px;
    line-height:1.5;
    margin-bottom:26px;
}

.campo{
    margin-bottom:14px;
}

label{
    display:block;
    font-size:12px;
    font-weight:900;
    color:#bfdbfe;
    margin-bottom:7px;
    letter-spacing:.5px;
}

input{
    width:100%;
    min-height:48px;
    border-radius:14px;
    border:1px solid rgba(147,197,253,.22);
    background:#020617;
    color:#e5e7eb;
    padding:0 14px;
    font-size:14px;
    outline:none;
}

input:focus{
    border-color:#38bdf8;
    box-shadow:0 0 0 3px rgba(56,189,248,.12);
}

button{
    width:100%;
    min-height:50px;
    border:none;
    border-radius:15px;
    margin-top:10px;
    cursor:pointer;
    color:#fff;
    font-size:13px;
    font-weight:900;
    letter-spacing:.6px;
    background:linear-gradient(135deg,#2563eb,#0ea5e9);
    box-shadow:0 14px 30px rgba(14,165,233,.22);
}

button:disabled{
    opacity:.55;
    cursor:not-allowed;
}

.erro{
    display:none;
    margin-top:16px;
    padding:12px;
    border-radius:13px;
    background:rgba(220,38,38,.15);
    border:1px solid rgba(248,113,113,.28);
    color:#fecaca;
    font-size:13px;
    line-height:1.4;
    text-align:center;
}

.rodape{
    margin-top:22px;
    text-align:center;
    color:#64748b;
    font-size:11px;
    font-weight:700;
}
</style>
</head>

<body>

<div class="login-card">
    <div class="logo">
        <img src="assets/img/wesafer.png" alt="WE SAFER">
    </div>

    <div class="badge">MOURA - OPERACIONAL DE ACESSOS</div>

    <h1>ACESSO</h1>

    <p class="subtitulo">
        Acesse com seu usuário e senha.
    </p>

    <div class="campo">
        <label for="email">USUÁRIO</label>
        <input id="email" type="text" placeholder="Digite seu usuário" autocomplete="username">
    </div>

    <div class="campo">
        <label for="senha">SENHA</label>
        <input id="senha" type="password" placeholder="Digite sua senha" autocomplete="current-password">
    </div>

    <button id="btnEntrar" onclick="entrar()"> ACESSAR WESAFER TOOLS</button>

    <div id="erroLogin" class="erro"></div>

    <div class="rodape">WeSafer Produtos Digitais Ltda.</div>
</div>

<script src="supabase-config.js"></script>
<script>

const AUTH_KEY = "wesaferAuth"

function mostrarErro(mensagem){
    const erro = document.getElementById("erroLogin")
    erro.innerText = mensagem
    erro.style.display = "block"
}

function obterSessao(){
    return JSON.parse(localStorage.getItem(AUTH_KEY) || "null")
}

function salvarSessao(dados){
    const sessaoAtual = obterSessao() || {}

    localStorage.setItem(AUTH_KEY, JSON.stringify({
        access_token:dados.access_token || sessaoAtual.access_token,
        refresh_token:dados.refresh_token || sessaoAtual.refresh_token,
        user:dados.user || sessaoAtual.user,
        logado_em:sessaoAtual.logado_em || new Date().toISOString(),
        renovado_em:new Date().toISOString()
    }))
}

async function renovarSessao(){
    const sessao = obterSessao()

    if(!sessao || !sessao.refresh_token){
        return false
    }

    try{
        const resposta = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
            method:"POST",
            headers:{
                apikey: SUPABASE_ANON_KEY,
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                refresh_token:sessao.refresh_token
            })
        })

        const dados = await resposta.json()

        if(!resposta.ok || !dados.access_token){
            return false
        }

        salvarSessao(dados)
        return true
    }catch(erro){
        return false
    }
}

async function validarAccessToken(){
    const sessao = obterSessao()

    if(!sessao || !sessao.access_token){
        return false
    }

    try{
        const resposta = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
            headers:{
                apikey: SUPABASE_ANON_KEY,
                Authorization:`Bearer ${sessao.access_token}`
            }
        })

        return resposta.ok
    }catch(erro){
        return false
    }
}

async function validarSessaoExistente(){
    const sessao = obterSessao()

    if(!sessao || !sessao.access_token){
        return
    }

    if(await validarAccessToken()){
        window.location.href = "index.html"
        return
    }

    if(await renovarSessao()){
        window.location.href = "index.html"
        return
    }

    localStorage.removeItem(AUTH_KEY)
}

async function entrar(){
    const email = document.getElementById("email").value.trim()
    const senha = document.getElementById("senha").value
    const botao = document.getElementById("btnEntrar")

    document.getElementById("erroLogin").style.display = "none"

    if(!email || !senha){
        mostrarErro("Informe o usuário e a senha.")
        return
    }

    botao.disabled = true
    botao.innerText = "ENTRANDO..."

    try{
        const resposta = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
            method:"POST",
            headers:{
                apikey: SUPABASE_ANON_KEY,
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                email:email,
                password:senha
            })
        })

        const dados = await resposta.json()

        if(!resposta.ok){
            mostrarErro("Usuário ou senha inválidos.")
            botao.disabled = false
            botao.innerText = "ENTRAR NO SISTEMA"
            return
        }

        salvarSessao(dados)

        window.location.href = "index.html"
    }catch(erro){
        mostrarErro("Não foi possível conectar ao Supabase.")
        botao.disabled = false
        botao.innerText = "ENTRAR NO SISTEMA"
    }
}

document.addEventListener("keydown", evento => {
    if(evento.key === "Enter"){
        entrar()
    }
})

validarSessaoExistente()
</script>
</body>
</html>
