<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="icon" type="image/png" href="assets/img/favicon.ico">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGIN - WESAFER ACESSOS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/login.css?v=2.4.1">
</head>

<body>

<div class="login-card">
    <div class="logo">
        <img src="assets/img/wesafer.png" alt="WE SAFER">
    </div>

    <div class="badge">MOURA - OPERACIONAL DE ACESSOS</div>

    <h1>ACESSO</h1>

    <p class="subtitulo">
        Acesse com seu usuário e senha.
    </p>

    <div class="campo">
        <label for="email">USUÁRIO</label>
        <input id="email" type="text" placeholder="Digite seu usuário" autocomplete="username">
    </div>

    <div class="campo">
        <label for="senha">SENHA</label>
        <input id="senha" type="password" placeholder="Digite sua senha" autocomplete="current-password">
    </div>

    <button id="btnEntrar" onclick="entrar()"> ACESSAR WESAFER TOOLS</button>

    <div id="erroLogin" class="erro"></div>

    <div class="rodape">WeSafer Produtos Digitais Ltda.</div>
</div>

<script src="js/config/supabase-config.js"></script>
<script src="js/pages/login.js"></script>

</body>
</html>
